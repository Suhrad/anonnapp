name: Sync Supabase Markets

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  sync-markets:
    runs-on:
      - self-hosted
      - linux
      - x64
      - market-sync
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    defaults:
      run:
        working-directory: anonn-backend-master
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: anonn-backend-master/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Sync Polymarket markets to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          POLYMARKET_BASE_URL: ${{ secrets.POLYMARKET_BASE_URL }}
        run: npm run sync:markets
