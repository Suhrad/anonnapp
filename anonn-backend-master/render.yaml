services:
  - type: web
    name: anonn-backend
    env: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        fromService:
          type: web
          name: anonn-backend
          property: port
      - key: MONGODB_URI
        sync: false  # Set this in Render dashboard
      - key: JWT_SECRET
        sync: false  # Set this in Render dashboard
      - key: JWT_REFRESH_SECRET
        sync: false  # Set this in Render dashboard
      - key: JWT_EXPIRE
        value: 7d
      - key: JWT_REFRESH_EXPIRE
        value: 30d
      - key: CORS_ORIGIN
        sync: false  # Set this in Render dashboard (comma-separated URLs)
      - key: ETHEREUM_RPC_URL
        sync: false  # Optional: Set if needed
      - key: POLYGON_RPC_URL
        sync: false
      - key: SOLANA_RPC_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: POLYMARKET_BASE_URL
        value: https://gamma-api.polymarket.com

